<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Simple Expense Tracker</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Simple Expense Tracker</h1>
        <p>Track your daily spending easily</p>
    </div>

    <div class="summary-card">
        <h2>Total Spending</h2>
        <p th:text="'R ' + ${#numbers.formatDecimal(totalExpenses, 1, 2)}">R 0.00</p>
    </div>

    <div class="card">
        <h2>Spending by Category</h2>
        <canvas id="categoryChart"></canvas>
    </div>

    <div class="card">
        <h2 th:text="${expense != null and expense.id != null ? 'Edit Expense' : 'Add New Expense'}">
            Add New Expense
        </h2>

        <form th:action="@{/save}" th:object="${expense}" method="post">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{date}">

            <div class="form-group">
                <label>Expense Title</label>
                <input type="text" th:field="*{title}" placeholder="Example: Lunch" required>
            </div>

            <div class="form-group">
                <label>Category</label>
                <select th:field="*{category}" required>
                    <option value="">Select category</option>
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="School">School</option>
                    <option value="Bills">Bills</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Amount</label>
                <input type="number" step="0.01" th:field="*{amount}" placeholder="Example: 50.00" required>
            </div>

            <button type="submit"
                    th:text="${expense != null and expense.id != null ? 'Update Expense' : 'Save Expense'}">
                Save Expense
            </button>
        </form>
    </div>

    <div class="card">
        <h2>Expense List</h2>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Category</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="expense : ${expenses}">
                <td th:text="${expense.id}"></td>
                <td th:text="${expense.title}"></td>
                <td th:text="${expense.category}"></td>
                <td th:text="'R ' + ${expense.amount}"></td>
                <td th:text="${expense.date}"></td>
                <td>
                    <a class="edit-btn" th:href="@{/edit/{id}(id=${expense.id})}">Edit</a>
                    <a class="delete-btn" th:href="@{/delete/{id}(id=${expense.id})}">Delete</a>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(expenses)}">
                <td colspan="6" class="empty">No expenses added yet.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script th:inline="javascript">
    const categoryTotals = /*[[${categoryTotals}]]*/ {};

    const labels = Object.keys(categoryTotals);
    const values = Object.values(categoryTotals);

    const ctx = document.getElementById('categoryChart');

    if (ctx && labels.length > 0) {
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Amount Spent (R)',
                    data: values
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        display: true
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    }
</script>

</body>
</html>
