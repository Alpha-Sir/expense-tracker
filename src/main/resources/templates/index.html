<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Simple Expense Tracker</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Simple Expense Tracker</h1>
        <p>Track your daily spending easily</p>
    </div>

    <div class="card">
        <h2>Add New Expense</h2>

        <form th:action="@{/save}" th:object="${expense}" method="post">
            <div class="form-group">
                <label>Expense Title</label>
                <input type="text" th:field="*{title}" placeholder="Example: Lunch" required>
            </div>

            <div class="form-group">
                <label>Category</label>
                <select th:field="*{category}" required>
                    <option value="">Select category</option>
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="School">School</option>
                    <option value="Bills">Bills</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Amount</label>
                <input type="number" step="0.01" th:field="*{amount}" placeholder="Example: 50.00" required>
            </div>

            <button type="submit">Save Expense</button>
        </form>
    </div>

    <div class="card">
        <h2>Expense List</h2>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Category</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="expense : ${expenses}">
                <td th:text="${expense.id}"></td>
                <td th:text="${expense.title}"></td>
                <td th:text="${expense.category}"></td>
                <td th:text="'R ' + ${expense.amount}"></td>
                <td th:text="${expense.date}"></td>
                <td>
                    <a class="delete-btn" th:href="@{/delete/{id}(id=${expense.id})}">Delete</a>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(expenses)}">
                <td colspan="6" class="empty">No expenses added yet.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
